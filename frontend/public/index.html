<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    />
    <meta name="theme-color" content="#0F172A" />
    <meta
        name="description"
        content="SIGIP - Sistema de Gestión de Direcciones IP del Hospital Militar"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <title>SIGIP | Hospital Militar</title>

    <script>
        window.addEventListener(
            "error",
            function (e) {
                if (
                    e.error instanceof DOMException &&
                    e.error.name === "DataCloneError" &&
                    e.message &&
                    e.message.includes("PerformanceServerTiming")
                ) {
                    e.stopImmediatePropagation();
                    e.preventDefault();
                }
            },
            true
        );
    </script>
</head>

<body>
    <noscript>
        Debes habilitar JavaScript para ejecutar esta aplicación.
    </noscript>

    <div id="root"></div>
</body>
</html>
